<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
</head>
<body>

    <header class="header">
        <div class="logo">  
            <img src="./assets/logo.png" alt="logo-img">
            <span class="brand-name">Character Counter</span>
        </div>
        <button type="button">
            <p>cambiar tema</p>
        </button>
    </header>

    <main class="analyze">
        <h1>Analyze your text <br> in real-time</h1>
        <textarea name="text" id="text-area" placeholder="Start typing here..."></textarea>
        
        <div class="control-panel">
            <form class="inputs">
                <input type="checkbox" id="input1">
                <label for="input1">Exclude spaces</label>

                <input type="checkbox" id="input2">
                <label for="input2">Set Character limit</label>
            </form>
            <p class="reading-time">Approx. reading time: &lt;1 minute</p>
        </div>
        
        <section class="stats">
            <div class="cards">
                <article class="purple-card">
                    <h2>Total Characters</h2>
                    <p class="value">278</p>
                </article>
                <article class="orange-card">
                    <h2>Word Count</h2>
                    <p class="value2">39</p>
                </article>
                <article class="pink-card">
                    <h2>Sentence Count</h2>
                    <p class="value3">04</p>
                </article>
            </div>

            <section class="stadistics">
                <h3>Letter Density</h3>
                <div class="Letter-density">
                    <span>E</span>
                    <progress value="16.06" max="100"></progress>
                    <span class="count">40 (16.06%)</span>
                </div>
                <div class="Letter-density">
                    <span>I</span>
                    <progress value="11.65" max="100"></progress>
                    <span class="count">29 (11.65%)</span>
                </div>
                <div class="Letter-density">
                    <span>T</span>
                    <progress value="11.24" max="100"></progress>
                    <span class="count">28 (11.24%)</span>
                </div>
                <div class="Letter-density">
                    <span>O</span>
                    <progress value="8.84" max="100"></progress>
                    <span class="count">22 (8.84%)</span>
                </div>
                <div class="Letter-density">
                    <span>N</span>
                    <progress value="8.43" max="100"></progress>
                    <span class="count">21 (8.43%)</span>
                </div>
                <button type="button">See more</button>
            </section>
        </section>

    </main>

</body>
</html>
